# Recipe: Qwen3.6-35B-A3B-int4-AutoRound

recipe_version: "1"
name: Qwen3.6-35B-A3B-int4-AutoRound
description: vLLM serving Qwen3.6-35B-A3B-int4-AutoRound

# No HF download needed - model is already local
# model: null (or omit entirely)

solo_only: true

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5

mods:
  - mods/fix-qwen3.6-enhanced-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  max_model_len: 128K
  gpu_memory_utilization: 0.60
  max_num_batched_tokens: 32768
  max-num-seqs: 4
  served_model_name: sar/qwen3.6-35b
  generation_config: '{"temperature": 0.7}'
  speculative_mtp: '{"method": "mtp", "num_speculative_tokens": 2}'
  speculative_dflash: '{"method": "dflash", "model":"z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 5}'

# Environment variables
env:
  TORCH_MATMUL_PRECISION: high
  NVIDIA_FORWARD_COMPAT: '1'
  NVIDIA_DISABLE_REQUIRE: '1'
  CUDA_DEVICE_MAX_CONNECTIONS: '1'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  VLLM_ENFORCE_STRICT_TOOL_CALLING: false
  FLASHINFER_DISABLE_VERSION_CHECK: 1
  CUTE_DSL_ARCH: sm_121a
  HF_HUB_OFFLINE: 1
  TRANSFORMERS_OFFLINE: 1

# The vLLM serve command template
command: |
  vllm serve /models/Qwen3.6-35B-A3B-int4-AutoRound \
  --served-model-name {served_model_name} \
  --max-model-len {max_model_len} \
  --gpu-memory-utilization {gpu_memory_utilization} \
  --max-num-batched-tokens {max_num_batched_tokens} \
  --max-num-seqs {max-num-seqs} \
  --optimization-level 3 \
  --performance-mode throughput \
  --port {port} \
  --host {host} \
  --dtype bfloat16 \
  --load-format fastsafetensors \
  --attention-backend flash_attn \
  --moe-backend marlin \
  --enable-prefix-caching \
  --enable-chunked-prefill \
  --default-chat-template-kwargs '{{"preserve_thinking":true}}' \
  --enable-auto-tool-choice \
  --tool-call-parser qwen3_coder \
  --reasoning-parser qwen3 \
  --generation-config auto \
  --override-generation-config '{generation_config}' \
  --chat-template qwen3.6-enhanced.jinja

#  --speculative-config '{speculative_mtp}'
#  --speculative-config '{speculative_dflash}'
